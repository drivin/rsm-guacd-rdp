name: Build bundled guacd

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  GUAC_VERSION: 1.6.0
  PREFIX_DIR: /opt/guac
  DESTDIR: /tmp/guac-install

jobs:

  build-linux:
    runs-on: ubuntu-24.04

    env:
      ARTIFACT_NAME: guacd-linux-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential autoconf automake libtool pkg-config \
            libcairo2-dev libjpeg-turbo8-dev libpng-dev uuid-dev \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev \
            freerdp2-dev libpango1.0-dev libssh2-1-dev libtelnet-dev \
            libvncserver-dev libwebsockets-dev libpulse-dev \
            wget ca-certificates

      - name: Download guacamole-server
        run: |
          wget https://archive.apache.org/dist/guacamole/${GUAC_VERSION}/source/guacamole-server-${GUAC_VERSION}.tar.gz
          tar -xzf guacamole-server-${GUAC_VERSION}.tar.gz

      - name: Configure
        working-directory: guacamole-server-${{ env.GUAC_VERSION }}
        run: |
          ./configure --prefix=${PREFIX_DIR}

      - name: Build
        working-directory: guacamole-server-${{ env.GUAC_VERSION }}
        run: |
          make -j$(nproc)

      - name: Install
        working-directory: guacamole-server-${{ env.GUAC_VERSION }}
        run: |
          make DESTDIR=${DESTDIR} install

      - name: Bundle
        run: |
          mkdir -p bundle/bin bundle/lib
          cp ${DESTDIR}${PREFIX_DIR}/sbin/guacd bundle/bin/
          find ${DESTDIR}${PREFIX_DIR}/lib -name "*.so*" -exec cp {} bundle/lib/ \;

      - name: Archive
        run: |
          tar -czf ${ARTIFACT_NAME}.tar.gz -C bundle .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}.tar.gz


  build-windows:
    runs-on: windows-2022

    env:
      ARTIFACT_NAME: guacd-windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cairo
            mingw-w64-x86_64-freerdp
            mingw-w64-x86_64-libpng
            mingw-w64-x86_64-libjpeg-turbo
            mingw-w64-x86_64-libssh2
            mingw-w64-x86_64-libvncserver
            mingw-w64-x86_64-pango
            mingw-w64-x86_64-libwebsockets
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-dlfcn
            mingw-w64-x86_64-util-linux
            autoconf
            automake
            libtool
            make
            wget

      - name: Download source
        shell: msys2 {0}
        run: |
          wget https://archive.apache.org/dist/guacamole/${GUAC_VERSION}/source/guacamole-server-${GUAC_VERSION}.tar.gz
          tar -xzf guacamole-server-${GUAC_VERSION}.tar.gz

      - name: Configure
        shell: msys2 {0}
        run: |
          cd guacamole-server-${GUAC_VERSION}

          # Windows hat kein timer_create()
          export ac_cv_func_timer_create=yes

          # MSYS2 dlfcn package provides libdl/dlopen wrapper
          export LIBS="-ldl ${LIBS:-}"

          ./configure \
            --prefix=/mingw64 \
            --disable-posix-timers

      - name: Build
        shell: msys2 {0}
        run: |
          cd guacamole-server-${GUAC_VERSION}
          make -j$(nproc)

      - name: Install
        shell: msys2 {0}
        run: |
          cd guacamole-server-${GUAC_VERSION}
          make install

      - name: Bundle
        shell: msys2 {0}
        run: |
          mkdir bundle
          cp /mingw64/sbin/guacd.exe bundle/

      - name: Archive
        run: |
          tar -czf ${env:ARTIFACT_NAME}.tar.gz bundle

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}.tar.gz