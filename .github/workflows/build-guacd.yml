name: Build bundled guacd

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  GUAC_VERSION: 1.6.0
  PREFIX_DIR: /opt/guac
  DESTDIR: /tmp/guac-install

jobs:

  build-linux:
    runs-on: ubuntu-24.04

    env:
      ARTIFACT_NAME: guacd-linux-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential autoconf automake libtool pkg-config \
            libcairo2-dev libjpeg-turbo8-dev libpng-dev uuid-dev \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev \
            freerdp2-dev libpango1.0-dev libssh2-1-dev libtelnet-dev \
            libvncserver-dev libwebsockets-dev libpulse-dev \
            curl ca-certificates

      - name: Download guacamole-server
        run: |
          VERSION=$(echo "$GUAC_VERSION" | tr -d '\r\n')
          echo "Downloading Guacamole $VERSION"
          curl -fL -o guacamole.tar.gz "https://archive.apache.org/dist/guacamole/${VERSION}/source/guacamole-server-${VERSION}.tar.gz"
          tar -xzf guacamole.tar.gz

      - name: Configure
        run: |
          VERSION=$(echo "$GUAC_VERSION" | tr -d '\r\n')
          cd guacamole-server-${VERSION}
          ./configure --prefix=${PREFIX_DIR}

      - name: Build
        run: |
          VERSION=$(echo "$GUAC_VERSION" | tr -d '\r\n')
          cd guacamole-server-${VERSION}
          make -j$(nproc)

      - name: Install
        run: |
          VERSION=$(echo "$GUAC_VERSION" | tr -d '\r\n')
          cd guacamole-server-${VERSION}
          make DESTDIR=${DESTDIR} install

      - name: Bundle
        run: |
          mkdir -p bundle/bin bundle/lib
          cp ${DESTDIR}${PREFIX_DIR}/sbin/guacd bundle/bin/
          find ${DESTDIR}${PREFIX_DIR}/lib -name "*.so*" -exec cp {} bundle/lib/ \;

      - name: Archive
        run: |
          tar -czf ${ARTIFACT_NAME}.tar.gz -C bundle .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}.tar.gz


  build-windows:
    runs-on: windows-2022

    env:
      ARTIFACT_NAME: guacd-windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Cygwin
        uses: cygwin/cygwin-install-action@v4
        with:
          packages: >
            gcc-core
            gcc-g++
            make
            autoconf
            automake
            libtool
            pkg-config
            libuuid-devel
            freerdp-devel
            cairo-devel
            libpng-devel
            libjpeg-devel
            libssh2-devel
            libwebsockets-devel
            libvncserver-devel
            curl

      - name: Download source
        shell: C:\cygwin\bin\bash.exe -eo pipefail {0}
        run: |
          curl -fL -o guacamole.tar.gz https://archive.apache.org/dist/guacamole/1.6.0/source/guacamole-server-1.6.0.tar.gz
          tar -xzf guacamole.tar.gz

      - name: Configure
        shell: C:\cygwin\bin\bash.exe -eo pipefail {0}
        run: |
          VERSION=$(echo "$GUAC_VERSION" | tr -d '\r\n')
          cd guacamole-server-${VERSION}
          ./configure --prefix=/usr

      - name: Build
        shell: C:\cygwin\bin\bash.exe -eo pipefail {0}
        run: |
          VERSION=$(echo "$GUAC_VERSION" | tr -d '\r\n')
          cd guacamole-server-${VERSION}
          make -j$(nproc)

      - name: Install
        shell: C:\cygwin\bin\bash.exe -eo pipefail {0}
        run: |
          VERSION=$(echo "$GUAC_VERSION" | tr -d '\r\n')
          cd guacamole-server-${VERSION}
          make install DESTDIR=/tmp/guac

      - name: Bundle
        shell: C:\cygwin\bin\bash.exe -eo pipefail {0}
        run: |
          mkdir bundle
          cp /tmp/guac/usr/sbin/guacd.exe bundle/

      - name: Archive
        run: |
          tar -czf ${env:ARTIFACT_NAME}.tar.gz bundle

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}.tar.gz